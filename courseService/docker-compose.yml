version: "6"
services:
  course-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=course-db
      - DB_PORT=5432
      - DB_NAME=course_db
      - DB_USER=course_user
      - DB_PASSWORD=course_password
    depends_on:
      - course-db

  course-db:
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=course_db
      - MYSQL_USER=course_user
      - MYSQL_PASSWORD=course_password
    ports:
      - "3306:3306"
    volumes:
      - course-db-data:/var/lib/mysql
      