spring.application.name=auth-service

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.config.import=optional:configserver:http://config-server:8888

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

admin.email=${ADMIN_EMAIL:admin@lms.com}
admin.password=${ADMIN_PASSWORD:Admin@1234}
admin.firstName=${ADMIN_FIRST_NAME:System}
admin.lastName=${ADMIN_LAST_NAME:Admin}

jwt.secret=mysupersecretkeymysupersecretkey123456

services.user-service.url=http://user-service:8081
services.course-service.url=http://course-service:8082
services.assessment-service.url=http://assessment-service:8083
services.enrollment-service.url=http://enrollment-service:8084
services.certificate-service.url=http://certificate-service:8085

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted